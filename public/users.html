<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Users — Torn Travel Planner</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body class="page-users">
		<header>
			<div class="header-inner">
				<div class="item-heading">
					<a href="/" class="back-link">← Stock overview</a>
					<h1>Users</h1>
					<span class="item-subtitle">Allowed access and admin roles</span>
				</div>
				<div class="header-meta">
					<div id="auth" class="auth">
						<form id="login-form" class="login-form">
							<input
								id="api-key"
								type="password"
								placeholder="Minimal Torn API Key"
								autocomplete="off"
							/>
							<button type="submit">Log in</button>
						</form>
						<div id="player-info" class="player-info hidden"></div>
					</div>
				</div>
			</div>
		</header>

		<main class="users-main">
			<p id="users-gate" class="users-gate">Checking admin access…</p>

			<section id="users-panel" class="users-panel hidden">
				<form id="user-create-form" class="user-create-form">
					<h2>Add user</h2>
					<div class="user-create-fields">
						<label>
							<span>Torn user ID</span>
							<input id="new-player-id" type="number" min="1" step="1" required />
						</label>
						<label>
							<span>Name</span>
							<input id="new-name" type="text" required autocomplete="off" />
						</label>
						<label class="checkbox">
							<input id="new-allowed" type="checkbox" checked />
							Allowed
						</label>
						<label class="checkbox">
							<input id="new-admin" type="checkbox" />
							Admin
						</label>
						<button type="submit">Add</button>
					</div>
				</form>

				<div class="users-table-wrap">
					<table class="users-table">
						<thead>
							<tr>
								<th>ID</th>
								<th>Name</th>
								<th>Allowed</th>
								<th>Admin</th>
								<th>Last login</th>
								<th></th>
							</tr>
						</thead>
						<tbody id="users-tbody"></tbody>
					</table>
				</div>
			</section>
		</main>

		<script src="/shared.js"></script>
		<script src="/alarms.js"></script>
		<script src="/api-tos.js"></script>
		<script src="/auth.js"></script>
		<script src="/users.js"></script>
	</body>
</html>
