<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Analytics — Torn Travel Planner</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body class="page-analytics">
		<header>
			<div class="header-inner">
				<div class="item-heading">
					<a href="/" class="back-link">← Stock overview</a>
					<h1>Analytics</h1>
					<span class="item-subtitle">Page loads</span>
				</div>
				<div class="header-meta">
					<div id="auth" class="auth">
						<form id="login-form" class="login-form">
							<input
								id="api-key"
								type="password"
								placeholder="Minimal Torn API Key"
								autocomplete="off"
							/>
							<button type="submit">Log in</button>
						</form>
						<div id="player-info" class="player-info hidden"></div>
					</div>
				</div>
			</div>
		</header>

		<main class="users-main">
			<p id="analytics-gate" class="users-gate">Checking admin access…</p>

			<section id="analytics-panel" class="users-panel hidden">
				<div class="analytics-toolbar">
					<button type="button" id="analytics-refresh" class="analytics-refresh-btn">Refresh</button>
				</div>
				<div class="users-table-wrap">
					<table class="users-table">
						<thead>
							<tr>
								<th>Time</th>
								<th>User ID</th>
								<th>Username</th>
								<th>URL</th>
								<th>IP</th>
							</tr>
						</thead>
						<tbody id="analytics-tbody"></tbody>
					</table>
				</div>
			</section>
		</main>

		<script src="/shared.js"></script>
		<script src="/alarms.js"></script>
		<script src="/api-tos.js"></script>
		<script src="/auth.js"></script>
		<script src="/analytics.js"></script>
	</body>
</html>
