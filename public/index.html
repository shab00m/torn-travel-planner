<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Torn Travel Planner</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<div class="header-inner">
				<h1>✈️ Torn Travel Planner</h1>
				<div class="header-meta">
					<div id="auth" class="auth">
						<form id="login-form" class="login-form">
							<input
								id="api-key"
								type="password"
								placeholder="Torn API key"
								autocomplete="off"
							/>
							<button type="submit">Log in</button>
						</form>
						<div id="player-info" class="player-info hidden"></div>
					</div>
					<span id="status" class="status">Loading…</span>
				</div>
			</div>
			<div class="filters">
				<input
					id="item-search"
					type="search"
					placeholder="Search items… (e.g. Xanax, Plushie)"
					autocomplete="off"
				/>
				<select id="country-filter">
					<option value="">All countries</option>
				</select>
				<label class="checkbox">
					<input id="in-stock-only" type="checkbox" />
					In stock only
				</label>
				<div class="time-format-setting">
					<span>Time format</span>
					<div class="range-buttons time-format-buttons">
						<button type="button" data-time-format="european">24h</button>
						<button type="button" data-time-format="us">12h</button>
					</div>
				</div>
			</div>
		</header>

		<main id="countries" class="countries"></main>

		<script src="shared.js"></script>
		<script src="app.js"></script>
		<script src="auth.js"></script>
	</body>
</html>
