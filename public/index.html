<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Torn Travel Planner</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<div class="header-inner">
				<div class="header-brand">
					<h1>✈️ Torn Travel Planner</h1>
				</div>
				<div class="header-meta">
					<div id="auth" class="auth">
						<form id="login-form" class="login-form">
							<input
								id="api-key"
								type="password"
								placeholder="Minimal Torn API Key"
								autocomplete="off"
							/>
							<button type="submit">Log in</button>
						</form>
						<div id="player-info" class="player-info hidden"></div>
					</div>
				</div>
			</div>
		</header>

		<div id="page-error" class="page-error hidden" role="alert"></div>

		<main class="home-main">
			<div id="favorites" class="favorites-mount"></div>
			<div class="filters">
				<input
					id="item-search"
					type="search"
					placeholder="Search items… (e.g. Xanax, Plushie)"
					autocomplete="off"
				/>
				<label class="group-by">
					<span class="group-by-label">Group by</span>
					<select id="stock-group-by">
						<option value="country">Country</option>
						<option value="type">Item type</option>
						<option value="none">None</option>
					</select>
				</label>
				<details class="filter-menu" id="country-filter">
					<summary class="filter-menu-summary">All countries</summary>
					<div class="filter-menu-panel" id="country-filter-list" role="group" aria-label="Countries"></div>
				</details>
				<details class="filter-menu" id="item-type-filter" title="Torn item type">
					<summary class="filter-menu-summary">All types</summary>
					<div class="filter-menu-panel" id="item-type-filter-list" role="group" aria-label="Item types"></div>
				</details>
				<label class="profit-range" title="Filter by profit per hour">
					<span class="profit-range-label">Profit/hr</span>
					<input id="profit-min" type="number" inputmode="numeric" placeholder="Min" step="1" />
					<span class="profit-range-sep">–</span>
					<input id="profit-max" type="number" inputmode="numeric" placeholder="Max" step="1" />
				</label>
				<label class="checkbox">
					<input id="in-stock-only" type="checkbox" />
					In stock only
				</label>
			</div>
			<div id="countries" class="countries"></div>
		</main>

		<script src="shared.js"></script>
		<script src="alarms.js"></script>
		<script src="api-tos.js"></script>
		<script src="auth.js"></script>
		<script src="app.js"></script>
	</body>
</html>
